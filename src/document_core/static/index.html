<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Document Core Operator-Konsole">
  <title>Document Core</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="Document Core Startseite">
      <span class="brand-mark" aria-hidden="true">DC</span>
      <span><strong>Document Core</strong><small>Operator Console</small></span>
    </a>
    <div class="system-state"><span id="health-dot" class="health-dot"></span><span id="health-text">System wird geprüft</span></div>
  </header>

  <main>
    <section class="hero">
      <div>
        <p class="eyebrow">Dokumentenfluss</p>
        <h1>Verarbeiten. Prüfen. Zustellen.</h1>
        <p class="hero-copy">Alle Eingänge, Ausnahmen und Zustellungen in einer ruhigen Arbeitsansicht.</p>
      </div>
      <label class="upload-button" for="file-upload">
        <span>Dokument hochladen</span>
        <input id="file-upload" type="file" hidden>
      </label>
    </section>

    <section id="stats" class="stats" aria-label="Statusübersicht"></section>

    <section class="workspace">
      <div class="list-pane">
        <div class="toolbar">
          <label class="search">
            <span class="sr-only">Jobs durchsuchen</span>
            <input id="search" type="search" placeholder="Datei, Job-ID oder Dokumenttyp">
          </label>
          <select id="status-filter" aria-label="Status filtern">
            <option value="">Alle Status</option>
            <option value="received">Eingegangen</option>
            <option value="processing">In Verarbeitung</option>
            <option value="quarantined">Zu prüfen</option>
            <option value="delivering">In Zustellung</option>
            <option value="delivered">Zugestellt</option>
            <option value="failed">Fehlgeschlagen</option>
          </select>
          <button id="refresh" class="icon-button" type="button" aria-label="Aktualisieren">↻</button>
        </div>
        <div id="job-list" class="job-list" aria-live="polite"></div>
        <div class="pagination">
          <button id="previous" type="button">Zurück</button>
          <span id="page-info"></span>
          <button id="next" type="button">Weiter</button>
        </div>
      </div>

      <aside id="detail-pane" class="detail-pane" aria-label="Jobdetails">
        <div class="empty-detail">
          <div class="empty-symbol">↗</div>
          <h2>Dokument auswählen</h2>
          <p>Öffne einen Job, um Inhalt, Metadaten und Verarbeitungsschritte zu sehen.</p>
        </div>
      </aside>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/static/app.js" defer></script>
</body>
</html>
